name: Deployment

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH and deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Save the SSH key and set permissions
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem

          # SSH into EC2 and perform deployment
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${EC2_USER}@${EC2_HOST} << 'EOF'
            # Navigate to your project folder
            cd /home/ubuntu/trader.pro-be

            # Pull the latest code from the staging branch
            git pull origin staging

            # Stop the current containers (if any)
            docker-compose down

            # Build and start the containers again
            docker-compose up --build -d

            # Optional: Check logs
            docker-compose logs -f
          EOF

          # Clean up the private key
          rm private_key.pem
